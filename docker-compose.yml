version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: postgres-m1
    restart: always
    environment:
      POSTGRES_DB: newsletter
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD: pass123
    ports:
      - "5432:5432"
    volumes:
      - ./data/pg:/var/lib/postgresql/data

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n-m1
    restart: always
    ports:
      - "5678:5678"
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: admin
      N8N_BASIC_AUTH_PASSWORD: pass123
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_DATABASE: newsletter
      DB_POSTGRESDB_USER: n8n
      DB_POSTGRESDB_PASSWORD: pass123
    volumes:
      - ./data/n8n:/home/node/.n8n
    depends_on:
      - postgres
